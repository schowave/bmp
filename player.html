<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bundesliga Manager Professional</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="utf-8">
    <style>
        body { margin: 0; background-color: #1a1a1a; height: 100%; display: flex; flex-direction: column; }
        html { height: 100%; }
        #screen { flex: 1; overflow: hidden; }
        #version { position: fixed; bottom: 4px; right: 8px; color: rgba(255,255,255,0.3); font: 11px monospace; z-index: 10; pointer-events: none; }
    </style>

    <script type="module" crossorigin="anonymous">
        import RFB from './core/rfb.js';

        const host = window.location.hostname;
        const port = window.location.port;
        const url = (window.location.protocol === 'https:' ? 'wss' : 'ws')
            + '://' + host + (port ? ':' + port : '') + '/websockify';

        const rfb = new RFB(document.getElementById('screen'), url);

        rfb.scaleViewport = true;
        rfb.clipViewport = true;
        rfb.compressionLevel = 5;
        rfb.qualityLevel = 4;
        rfb.resizeSession = false;
        rfb.background = '#1a1a1a';
    </script>
</head>

<body>
    <div id="screen"></div>
    <div id="version"></div>
    <script>fetch('version.txt').then(r=>r.text()).then(v=>document.getElementById('version').textContent='v'+v.trim())</script>
</body>
</html>
