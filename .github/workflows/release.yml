name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (leave empty for next patch, e.g. 4.0.1 → 4.0.2)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
    - uses: actions/checkout@v6

    - name: Determine version
      id: version
      env:
        INPUT_VERSION: ${{ github.event.inputs.version }}
      run: |
        CURRENT=$(cat VERSION | tr -d '[:space:]')
        if [ -n "$INPUT_VERSION" ]; then
          VERSION="$INPUT_VERSION"
        else
          VERSION=$(python3 -c "import sys; v=sys.argv[1].split('.'); v[-1]=str(int(v[-1])+1); print('.'.join(v))" "$CURRENT")
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Release version: $CURRENT → $VERSION"

    - name: Update VERSION file and tag
      env:
        VERSION: ${{ steps.version.outputs.VERSION }}
      run: |
        echo "$VERSION" > VERSION
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add VERSION
        git commit -m "Release v${VERSION}" || echo "No version change needed"
        git tag "v${VERSION}"
        git push origin main "v${VERSION}"

  docker-vnc:
    needs: version
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: v${{ needs.version.outputs.version }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push VNC image
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64
        push: true
        tags: |
          schowave/bmp:${{ needs.version.outputs.version }}
          schowave/bmp:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  docker-wasm:
    needs: version
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: v${{ needs.version.outputs.version }}

    - name: Build .jsdos bundle
      run: |
        cd wasm
        cp ../images/favicon.png .
        ./build-bundle.sh

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push WASM image
      uses: docker/build-push-action@v7
      with:
        context: wasm
        platforms: linux/amd64
        push: true
        tags: |
          schowave/bmp:wasm-${{ needs.version.outputs.version }}
          schowave/bmp:wasm
        cache-from: type=gha
        cache-to: type=gha,mode=max

  release:
    needs: [version, docker-vnc, docker-wasm]
    runs-on: ubuntu-latest
    steps:
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ needs.version.outputs.version }}
        generate_release_notes: true
