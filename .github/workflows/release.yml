name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (leave empty for next patch, e.g. 0.1.0 → 0.1.1)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Determine version
      id: version
      run: |
        CURRENT=$(cat VERSION | tr -d '[:space:]')
        if [ -n "${{ github.event.inputs.version }}" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=$(python3 -c "v='$CURRENT'.split('.'); v[-1]=str(int(v[-1])+1); print('.'.join(v))")
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Release version: $CURRENT → $VERSION"

    - name: Update VERSION file
      run: |
        echo "${{ steps.version.outputs.VERSION }}" > VERSION
        echo "Updated VERSION to ${{ steps.version.outputs.VERSION }}"

    - name: Create git tag
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add VERSION
        git commit -m "Release v${{ steps.version.outputs.VERSION }}" || echo "No version change needed"
        git tag "v${{ steps.version.outputs.VERSION }}"
        git push origin main "v${{ steps.version.outputs.VERSION }}"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push multi-arch image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          schowave/bmp:${{ steps.version.outputs.VERSION }}
          schowave/bmp:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        generate_release_notes: true
