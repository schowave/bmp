# DOSBox 0.74-3 — optimized for VNC streaming

[sdl]
fullscreen=true
fulldouble=true
fullresolution=desktop
windowresolution=original
output=overlay
autolock=false
sensitivity=100
waitonerror=false
priority=higher,normal
usescancodes=false

[dosbox]
machine=svga_s3
memsize=4

[render]
frameskip=0
aspect=true
scaler=none

[cpu]
core=dynamic
cputype=auto
cycles=max
cycleup=10
cycledown=20

[mixer]
nosound=true
rate=22050
blocksize=2048
prebuffer=25

[sblaster]
sbtype=none

[gus]
gus=false

[speaker]
pcspeaker=false

[joystick]
joysticktype=none

[serial]
serial1=disabled
serial2=disabled
serial3=disabled
serial4=disabled

[dos]
xms=true
ems=true
umb=true
keyboardlayout=auto

[ipx]
ipx=false
