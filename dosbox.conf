# DOSBox 0.74-3 — optimized for VNC streaming

[sdl]
fullscreen=true
fulldouble=true
fullresolution=desktop
windowresolution=original
output=overlay
autolock=false
sensitivity=100
waitonerror=false
priority=higher,normal
usescancodes=false

[dosbox]
machine=svga_s3
memsize=16

[render]
frameskip=1
aspect=true
scaler=none

[cpu]
core=auto
cputype=auto
cycles=max
cycleup=10
cycledown=20

[mixer]
nosound=false
rate=22050
blocksize=2048
prebuffer=25

[sblaster]
sbtype=sb16
sbbase=220
irq=7
dma=1
hdma=5
sbmixer=true
oplmode=auto
oplemu=default
oplrate=22050

[gus]
gus=false

[speaker]
pcspeaker=true
pcrate=22050

[joystick]
joysticktype=none

[serial]
serial1=disabled
serial2=disabled
serial3=disabled
serial4=disabled

[dos]
xms=true
ems=true
umb=true
keyboardlayout=auto

[ipx]
ipx=false
